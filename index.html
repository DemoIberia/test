<!DOCTYPE html>
<html lang="es">

<head>

    <title>Portal de Demos Mitel</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="home-page" data-page="home">

            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="pt">PT</button>

        <p data-i18n="subtitle">

        </p>

        <a href="hotel.html" class="demo-button">
            <img src="images/hospitality.svg" alt="Hospitality icon" class="icon">
            <span data-i18n="cta">Demo Hotel Mitel</span>
        </a>

        <a href="municipality.html" class="demo-button" style="margin-top: 16px;">
            <img src="images/municipality.svg" alt="Municipality icon" class="icon">
            <span data-i18n="ctaMunicipality">Demo Ayuntamiento</span>

    </div>

    <script src="js/i18n.js"></script>
