<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Local JS</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        button {
            padding: 10px 16px;
            cursor: pointer;
        }

        #out {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>Página web local con JavaScript</h1>

    <p>Pulsa el botón para ejecutar JavaScript localmente.</p>

    <button id="btnSaludo">
        Ejecutar JS
    </button>

    <div id="out"></div>

    <script>
        const boton = document.getElementById("btnSaludo");
        const salida = document.getElementById("out");

        boton.addEventListener("click", () => {
            salida.textContent =
                `JavaScript funcionando correctamente. Hora: ${new Date().toLocaleTimeString()}`;
        });
    </script>
    <script>
        import(`https://eu.engage.app/api/ecs/v1/loader/1cc9cc96-e572-4357-b645-b3f1b7cea843.js?path=${encodeURIComponent(window.location.origin+window.location.pathname)}&selectedVersion=${(new URLSearchParams(window.location.search)).get('ecsSelectedVersion') || ''}`)
    </script>
</body>
</html>
